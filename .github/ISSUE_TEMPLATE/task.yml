name: Maintainer task
description: Create a scoped contributor task for the Access Layer server.
title: '[Task]: '
labels:
   - help wanted
body:
   - type: dropdown
     id: section
     attributes:
        label: Section
        options:
           - Core API and data model
           - Indexing, ownership, and gated access
           - Platform, observability, and contributor experience
     validations:
        required: true
   - type: input
     id: outcome
     attributes:
        label: Desired outcome
     validations:
        required: true
   - type: textarea
     id: scope
     attributes:
        label: Scope
     validations:
        required: true
   - type: textarea
     id: acceptance
     attributes:
        label: Acceptance criteria
        placeholder: |
           - ...
           - ...
           - ...
     validations:
        required: true
   - type: dropdown
     id: difficulty
     attributes:
        label: Difficulty
        options:
           - good first issue
           - intermediate
           - advanced
     validations:
        required: true
