name: Documentation update
description: Improve server docs, setup, or maintainer guidance.
title: '[Docs]: '
labels:
   - documentation
body:
   - type: dropdown
     id: doc_area
     attributes:
        label: Documentation area
        options:
           - README
           - CONTRIBUTING guide
           - env and setup docs
           - issue backlog
           - API or architecture notes
     validations:
        required: true
   - type: textarea
     id: problem
     attributes:
        label: What is missing or unclear?
     validations:
        required: true
   - type: textarea
     id: proposal
     attributes:
        label: Proposed improvement
     validations:
        required: true
